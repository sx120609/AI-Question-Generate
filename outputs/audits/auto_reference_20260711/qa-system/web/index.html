<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自动质检系统</title>
<style>
:root {
  --bg: #f5f7fa;
  --card-bg: #fff;
  --text: #1a1a2e;
  --text-secondary: #666;
  --border: #e0e5ec;
  --primary: #4f6ef7;
  --primary-hover: #3b5de7;
  --success: #22c55e;
  --danger: #ef4444;
  --warning: #f59e0b;
  --info: #3b82f6;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* 顶部导航 */
.topbar {
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
.topbar .logo {
  font-size: 18px;
  font-weight: 700;
  color: var(--primary);
  display: flex;
  align-items: center;
  gap: 8px;
}
.topbar .logo .icon { font-size: 24px; }
.topbar .model-badge {
  font-size: 12px;
  background: #eef2ff;
  color: var(--primary);
  padding: 3px 10px;
  border-radius: 12px;
  font-weight: 500;
}
.nav-tabs {
  display: flex;
  gap: 4px;
}
.nav-tab {
  padding: 8px 18px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 14px;
  color: var(--text-secondary);
  border-radius: 8px;
  transition: all 0.2s;
  font-weight: 500;
}
.nav-tab:hover { background: #f0f2f5; color: var(--text); }
.nav-tab.active { background: var(--primary); color: #fff; }

/* 主容器 */
.main-container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px;
}

/* 仪表盘卡片 */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 20px 24px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 16px;
}
.stat-icon {
  width: 48px; height: 48px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}
.stat-icon.good { background: #dcfce7; }
.stat-icon.bad { background: #fee2e2; }
.stat-icon.pending { background: #fef3c7; }
.stat-icon.total { background: #dbeafe; }
.stat-info h3 { font-size: 28px; font-weight: 700; line-height: 1.2; }
.stat-info p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

/* 通用面板 */
.panel {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 24px;
  margin-bottom: 20px;
}
.panel h2 {
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* 表单 */
.form-row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 12px;
}
.form-group { flex: 1; min-width: 180px; }
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 4px;
  color: var(--text-secondary);
}
.form-group input, .form-group textarea, .form-group select {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  transition: border 0.2s;
  background: #fafbfc;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79,110,247,0.1);
  background: #fff;
}
.form-group textarea { resize: vertical; min-height: 140px; }

/* 按钮 */
.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: inherit;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
.btn-outline { background: #fff; color: var(--primary); border: 1px solid var(--primary); }
.btn-outline:hover { background: #eef2ff; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-sm { padding: 6px 14px; font-size: 13px; }

/* 结果展示 */
.result-card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin: 12px 0;
}
.result-card.pass { border-left: 4px solid var(--success); }
.result-card.fail { border-left: 4px solid var(--danger); }
.result-card.error { border-left: 4px solid var(--warning); }
.result-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.result-badge {
  font-size: 12px;
  padding: 3px 10px;
  border-radius: 12px;
  font-weight: 600;
}
.result-badge.pass { background: #dcfce7; color: #166534; }
.result-badge.fail { background: #fee2e2; color: #991b1b; }
.result-badge.error { background: #fef3c7; color: #92400e; }
.issue-item {
  background: #fff5f5;
  border-radius: 6px;
  padding: 12px;
  margin: 8px 0;
  border: 1px solid #fecaca;
}
.issue-item .issue-category {
  font-weight: 600;
  font-size: 13px;
  color: var(--danger);
  margin-bottom: 4px;
}
.issue-item .issue-detail { font-size: 13px; color: #444; margin: 2px 0; }

/* 进度条 */
.progress-bar-container {
  background: #e5e7eb;
  border-radius: 8px;
  height: 8px;
  margin: 12px 0;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 8px;
  transition: width 0.3s;
}

/* 加载 */
.spinner {
  display: inline-block;
  width: 20px; height: 20px;
  border: 2px solid #ccc;
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay {
  text-align: center;
  padding: 40px;
  color: var(--text-secondary);
}

/* 案例表格 */
.case-table-wrap { overflow-x: auto; }
.case-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.case-table th {
  background: #f8fafc;
  padding: 10px 12px;
  text-align: left;
  font-weight: 600;
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
}
.case-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.case-table tr:hover td { background: #fafbfc; }
.case-title {
  max-width: 400px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.case-badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
  white-space: nowrap;
}
.case-badge.good { background: #dcfce7; color: #166534; }
.case-badge.bad { background: #fee2e2; color: #991b1b; }

/* 分页 */
.pagination {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 16px;
  align-items: center;
}
.pagination button {
  padding: 6px 12px;
  border: 1px solid var(--border);
  background: #fff;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
}
.pagination button:hover { background: #f0f2f5; }
.pagination button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.pagination button:disabled { opacity: 0.4; cursor: not-allowed; }

/* 搜索框 */
.search-box {
  position: relative;
}
.search-box input {
  padding: 8px 12px 8px 36px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  width: 260px;
  font-family: inherit;
}
.search-box .search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: #999;
  font-size: 14px;
}

/* 工具栏 */
.toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 16px;
}
.toolbar-left { display: flex; gap: 8px; align-items: center; }

/* 提示 */
.toast {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 14px 20px;
  border-radius: 8px;
  color: #fff;
  font-size: 14px;
  z-index: 9999;
  animation: slideIn 0.3s ease;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.toast.success { background: #22c55e; }
.toast.error { background: #ef4444; }
.toast.info { background: #3b82f6; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* 过滤标签 */
.filter-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-tag {
  padding: 4px 12px;
  border-radius: 14px;
  font-size: 13px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: #fff;
  transition: all 0.2s;
}
.filter-tag:hover { background: #f0f2f5; }
.filter-tag.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* 隐藏 */
.hidden { display: none !important; }

/* 响应式 */
@media (max-width: 768px) {
  .main-container { padding: 12px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .topbar { padding: 0 12px; }
  .nav-tab { padding: 6px 10px; font-size: 13px; }
}
</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="topbar">
  <div class="logo">
    <span class="icon">🤖</span>
    <span>自动质检系统</span>
    <span class="model-badge" id="modelBadge">加载中...</span>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="dashboard">📊 仪表盘</button>
    <button class="nav-tab" data-tab="single">🔍 单条质检</button>
    <button class="nav-tab" data-tab="batch">📦 批量质检</button>
    <button class="nav-tab" data-tab="cases">📋 案例浏览</button>
  </div>
</div>

<div class="main-container">

  <!-- ==================== 仪表盘 ==================== -->
  <div id="tab-dashboard">
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-icon total">📚</div><div class="stat-info"><h3 id="statTotal">-</h3><p>总案例数</p></div></div>
      <div class="stat-card"><div class="stat-icon good">✅</div><div class="stat-info"><h3 id="statGood">-</h3><p>GoodCase（通过）</p></div></div>
      <div class="stat-card"><div class="stat-icon bad">❌</div><div class="stat-info"><h3 id="statBad">-</h3><p>BadCase（不通过）</p></div></div>
      <div class="stat-card"><div class="stat-icon pending">⏳</div><div class="stat-info"><h3 id="statPending">-</h3><p>待质检</p></div></div>
    </div>

    <div class="panel" id="lastBatchPanel">
      <h2>📈 最近批量质检</h2>
      <div id="lastBatchContent" style="color: var(--text-secondary);">加载中...</div>
    </div>

    <div class="panel">
      <h2>⚙️ 系统信息</h2>
      <div id="configInfo" style="font-size: 14px; color: var(--text-secondary);">加载中...</div>
    </div>
  </div>

  <!-- ==================== 单条质检 ==================== -->
  <div id="tab-single" class="hidden">
    <div class="panel">
      <h2>🔍 单条题目质检</h2>
      <p style="color: var(--text-secondary); font-size: 13px; margin-bottom: 16px;">
        输入题目内容和任务类型，系统将调用 AI 对题目进行质量检查。
      </p>

      <div class="form-row">
        <div class="form-group" style="min-width: 120px;">
          <label>任务类型</label>
          <select id="singleTaskType">
            <option value="">请选择</option>
            <option value="L1">L1 简单型</option>
            <option value="L2">L2 流程型</option>
            <option value="L3">L3 复杂型</option>
          </select>
        </div>
        <div class="form-group" style="min-width: 120px;">
          <label>使用 Few-Shot</label>
          <select id="singleFewShot">
            <option value="true">✅ 启用（推荐）</option>
            <option value="false">❌ 禁用</option>
          </select>
        </div>
      </div>

      <div class="form-group" style="margin-bottom: 12px;">
        <label>题目内容 *</label>
        <textarea id="singleTitle" placeholder="请输入需要质检的题目内容..."></textarea>
      </div>

      <button class="btn btn-primary" onclick="runSingleQA()" id="btnSingleQA">
        🚀 开始质检
      </button>

      <div id="singleResult" style="margin-top: 20px;"></div>
    </div>
  </div>

  <!-- ==================== 批量质检 ==================== -->
  <div id="tab-batch" class="hidden">
    <div class="panel">
      <h2>📦 批量质检</h2>
      <p style="color: var(--text-secondary); font-size: 13px; margin-bottom: 16px;">
        从反馈表中读取待质检题目（无质检意见的题目），批量调用 AI 进行质量检查。
      </p>

      <div class="form-row">
        <div class="form-group" style="min-width: 120px; max-width: 200px;">
          <label>数量限制</label>
          <select id="batchLimit">
            <option value="0">全部</option>
            <option value="5">5 条</option>
            <option value="10" selected>10 条</option>
            <option value="20">20 条</option>
            <option value="50">50 条</option>
          </select>
        </div>
        <div class="form-group" style="min-width: 120px; max-width: 200px;">
          <label>Few-Shot</label>
          <select id="batchFewShot">
            <option value="true">✅ 启用</option>
            <option value="false">❌ 禁用</option>
          </select>
        </div>
      </div>

      <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <button class="btn btn-primary" onclick="runBatchQA()" id="btnBatchQA">
          🚀 开始批量质检
        </button>
        <button class="btn btn-outline" onclick="loadPendingList()">
          📋 刷新待检列表
        </button>
      </div>

      <div id="batchPending" style="margin-top: 16px;"></div>
      <div id="batchProgress" style="margin-top: 16px;"></div>
      <div id="batchResults" style="margin-top: 16px;"></div>
    </div>
  </div>

  <!-- ==================== 案例浏览 ==================== -->
  <div id="tab-cases" class="hidden">
    <div class="panel">
      <h2>📋 案例浏览</h2>
      <div class="toolbar">
        <div class="toolbar-left">
          <div class="filter-tags" id="filterTags">
            <span class="filter-tag active" data-type="all">全部</span>
            <span class="filter-tag" data-type="good">✅ GoodCase</span>
            <span class="filter-tag" data-type="bad">❌ BadCase</span>
            <span class="filter-tag" data-type="pending">⏳ 待质检</span>
          </div>
        </div>
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="caseSearch" placeholder="搜索 UID / 题目..." oninput="loadCases(1)">
        </div>
      </div>

      <div class="case-table-wrap">
        <table class="case-table">
          <thead>
            <tr>
              <th>类型</th>
              <th>UID</th>
              <th>任务类型</th>
              <th>题目摘要</th>
              <th>质检意见</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="caseTableBody">
            <tr><td colspan="6" style="text-align:center; color:#999; padding:24px;">加载中...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="pagination" id="casePagination"></div>
    </div>

    <!-- 案例详情弹窗 -->
    <div id="caseDetailModal" class="hidden" style="position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.4); z-index:1000; display:none; align-items:center; justify-content:center;">
      <div style="background:#fff; border-radius:12px; max-width:800px; width:90%; max-height:85vh; overflow-y:auto; padding:24px; box-shadow:0 8px 32px rgba(0,0,0,0.2);">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
          <h3 id="caseDetailTitle" style="margin:0;">案例详情</h3>
          <button class="btn btn-sm btn-outline" onclick="document.getElementById('caseDetailModal').style.display='none'">✕ 关闭</button>
        </div>
        <div id="caseDetailContent"></div>
      </div>
    </div>
  </div>

</div>

<script>
// ========== 全局状态 ==========
let currentTab = 'dashboard';
let caseType = 'all';
let casePage = 1;

// ========== 导航切换 ==========
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
    document.getElementById('tab-' + currentTab).classList.remove('hidden');
    if (currentTab === 'dashboard') loadDashboard();
    if (currentTab === 'cases') loadCases(1);
    if (currentTab === 'batch') loadPendingList();
  });
});

// ========== 案例类型过滤 ==========
document.querySelectorAll('#filterTags .filter-tag').forEach(tag => {
  tag.addEventListener('click', () => {
    document.querySelectorAll('#filterTags .filter-tag').forEach(t => t.classList.remove('active'));
    tag.classList.add('active');
    caseType = tag.dataset.type;
    casePage = 1;
    loadCases(1);
  });
});

// ========== 提示 ==========
function showToast(msg, type = 'info') {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ========== API 调用 ==========
async function api(url, opts = {}) {
  try {
    const res = await fetch(url, opts);
    return await res.json();
  } catch (e) {
    showToast('请求失败: ' + e.message, 'error');
    return null;
  }
}

// ========== 仪表盘 ==========
async function loadDashboard() {
  const data = await api('/api/dashboard');
  if (!data) return;

  document.getElementById('statTotal').textContent = data.totalCases;
  document.getElementById('statGood').textContent = data.goodCount;
  document.getElementById('statBad').textContent = data.badCount;
  document.getElementById('statPending').textContent = data.pendingCount;
  document.getElementById('modelBadge').textContent = data.model || 'deepseek-chat';

  // 最近批量结果
  const batchDiv = document.getElementById('lastBatchContent');
  if (data.lastBatch) {
    const lb = data.lastBatch;
    batchDiv.innerHTML = `
      <div style="display:flex; gap:24px; flex-wrap:wrap;">
        <div><strong>时间:</strong> ${new Date(lb.time).toLocaleString('zh-CN')}</div>
        <div><strong>总计:</strong> ${lb.total} 条</div>
        <div><span style="color:var(--success);">✅ 通过: ${lb.passed}</span></div>
        <div><span style="color:var(--danger);">❌ 不通过: ${lb.failed}</span></div>
        <div><strong>通过率:</strong> ${lb.total > 0 ? Math.round(lb.passed/lb.total*100) : 0}%</div>
      </div>`;
  } else {
    batchDiv.textContent = '暂无批量质检记录';
  }

  // 配置信息
  const cfg = await api('/api/config');
  if (cfg) {
    document.getElementById('configInfo').innerHTML = `
      <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:8px;">
        <div>模型: <code>${cfg.model}</code></div>
        <div>Few-Shot 数量: ${cfg.fewShotCount}</div>
        <div>Temperature: ${cfg.temperature}</div>
        <div>Max Tokens: ${cfg.maxTokens}</div>
        <div>Prompt 文件: <code style="font-size:12px;">${cfg.promptFile}</code></div>
        <div>案例文件: <code style="font-size:12px;">${cfg.casesFile}</code></div>
      </div>`;
  }
}

// ========== 单条质检 ==========
async function runSingleQA() {
  const title = document.getElementById('singleTitle').value.trim();
  const taskType = document.getElementById('singleTaskType').value;
  const useFewShot = document.getElementById('singleFewShot').value === 'true';

  if (!title) { showToast('请输入题目内容', 'error'); return; }

  const btn = document.getElementById('btnSingleQA');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 质检中...';

  const resultDiv = document.getElementById('singleResult');
  resultDiv.innerHTML = '<div class="loading-overlay"><span class="spinner"></span> AI 正在分析...</div>';

  const data = await api('/api/qa/single', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, taskType, useFewShot }),
  });

  btn.disabled = false;
  btn.innerHTML = '🚀 开始质检';

  if (!data) return;
  resultDiv.innerHTML = renderResultCard(data);
}

function renderResultCard(data) {
  if (data.error) {
    return `<div class="result-card error">
      <div class="result-header"><strong>⚠️ 错误</strong><span class="result-badge error">异常</span></div>
      <p style="color:var(--danger);">${data.error}</p>
    </div>`;
  }

  const cls = data.pass === true ? 'pass' : 'fail';
  const badgeText = data.pass === true ? '✅ 通过' : '❌ 不通过';
  const badgeCls = data.pass === true ? 'pass' : 'fail';

  let issuesHtml = '';
  if (data.issues && data.issues.length > 0) {
    issuesHtml = data.issues.map((issue, i) => `
      <div class="issue-item">
        <div class="issue-category">[${i+1}] ${issue.category || '未分类'} (${issue.severity || '未标注'})</div>
        <div class="issue-detail"><strong>问题:</strong> ${issue.problem || ''}</div>
        <div class="issue-detail"><strong>建议:</strong> ${issue.short_note || issue.fix || ''}</div>
      </div>
    `).join('');
  } else if (data.pass === true) {
    issuesHtml = '<p style="color:var(--success);">🎉 该题目通过质检，未发现问题。</p>';
  }

  return `<div class="result-card ${cls}">
    <div class="result-header">
      <strong>质检结果</strong>
      <span class="result-badge ${badgeCls}">${badgeText}</span>
    </div>
    ${issuesHtml}
    <div style="font-size:12px; color:var(--text-secondary); margin-top:12px;">
      ⏱️ 耗时: ${data.time}s | 💰 Token: ${data.tokens}
    </div>
  </div>`;
}

// ========== 批量质检 ==========
async function loadPendingList() {
  const cases = await api('/api/cases?type=pending&pageSize=200');
  const div = document.getElementById('batchPending');
  if (!cases || cases.items.length === 0) {
    div.innerHTML = '<p style="color:var(--warning); margin-top:12px;">⚠️ 没有待质检的题目（所有题目都已有质检意见）</p>';
    return;
  }
  div.innerHTML = `<p style="margin-top:12px; font-weight:500;">📋 当前有 <strong style="color:var(--primary);">${cases.total}</strong> 条待质检题目</p>
    <div style="font-size:13px; color:var(--text-secondary); max-height:200px; overflow-y:auto;">
      ${cases.items.slice(0, 20).map(c => `<div>• ${c.uid} - ${(c.title||'').substring(0,60)}...</div>`).join('')}
      ${cases.total > 20 ? `<div>... 还有 ${cases.total - 20} 条</div>` : ''}
    </div>`;
}

async function runBatchQA() {
  const limit = parseInt(document.getElementById('batchLimit').value);
  const useFewShot = document.getElementById('batchFewShot').value === 'true';

  const btn = document.getElementById('btnBatchQA');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 批量质检中...';

  const progressDiv = document.getElementById('batchProgress');
  const resultsDiv = document.getElementById('batchResults');
  progressDiv.innerHTML = '<div class="loading-overlay"><span class="spinner"></span> 正在执行批量质检，请耐心等待...</div>';
  resultsDiv.innerHTML = '';

  const data = await api('/api/qa/batch', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ limit, useFewShot }),
  });

  btn.disabled = false;
  btn.innerHTML = '🚀 开始批量质检';
  progressDiv.innerHTML = '';

  if (!data) return;

  if (data.message) {
    resultsDiv.innerHTML = `<p style="color:var(--warning);">${data.message}</p>`;
    return;
  }

  // 汇总
  const passRate = data.total > 0 ? Math.round(data.passed / data.total * 100) : 0;
  let html = `<div class="panel" style="margin-top:16px;">
    <h2>📊 批量质检完成</h2>
    <div class="stats-grid" style="margin-bottom:0;">
      <div class="stat-card"><div class="stat-icon total">📚</div><div class="stat-info"><h3>${data.total}</h3><p>总计</p></div></div>
      <div class="stat-card"><div class="stat-icon good">✅</div><div class="stat-info"><h3>${data.passed}</h3><p>通过</p></div></div>
      <div class="stat-card"><div class="stat-icon bad">❌</div><div class="stat-info"><h3>${data.failed}</h3><p>不通过</p></div></div>
      <div class="stat-card"><div class="stat-icon pending">📊</div><div class="stat-info"><h3>${passRate}%</h3><p>通过率</p></div></div>
    </div>
  </div>`;

  // 各条结果
  html += '<div style="margin-top:16px;">';
  for (const r of data.results) {
    html += `<div class="result-card ${r.pass === true ? 'pass' : 'fail'}">
      <div class="result-header">
        <strong>${r.uid}</strong>
        <span class="result-badge ${r.pass === true ? 'pass' : 'fail'}">${r.pass === true ? '✅ 通过' : '❌ 不通过'}</span>
      </div>
      <div style="font-size:13px; color:var(--text-secondary); margin-bottom:8px;">${(r.title||'').substring(0,120)}...</div>`;
    if (r.issues && r.issues.length > 0) {
      for (const issue of r.issues) {
        html += `<div class="issue-item">
          <div class="issue-category">${issue.category || ''} (${issue.severity || ''})</div>
          <div class="issue-detail">${issue.problem || ''}</div>
        </div>`;
      }
    }
    html += `<div style="font-size:11px; color:var(--text-secondary);">⏱️ ${r.time}s | 💰 ${r.tokens} tokens</div></div>`;
  }
  html += '</div>';

  resultsDiv.innerHTML = html;
  showToast(`批量质检完成: ${data.passed} 通过, ${data.failed} 不通过`, 'success');
}

// ========== 案例浏览 ==========
async function loadCases(page) {
  casePage = page;
  const search = document.getElementById('caseSearch').value;
  const data = await api(`/api/cases?type=${caseType}&page=${page}&pageSize=20&search=${encodeURIComponent(search)}`);

  if (!data) return;

  const tbody = document.getElementById('caseTableBody');
  if (data.items.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#999; padding:24px;">无匹配案例</td></tr>';
  } else {
    tbody.innerHTML = data.items.map(c => {
      const badgeCls = c.caseType === 'good' ? 'good' : 'bad';
      const badgeText = c.caseType === 'good' ? 'GoodCase' : 'BadCase';
      return `<tr>
        <td><span class="case-badge ${badgeCls}">${badgeText}</span></td>
        <td style="white-space:nowrap;font-size:12px;">${c.uid || '-'}</td>
        <td style="white-space:nowrap;">${c.taskType || '-'}</td>
        <td><div class="case-title">${(c.title || '').substring(0, 100)}</div></td>
        <td style="font-size:12px; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${(c.issues || '').substring(0, 80) || '-'}</td>
        <td><button class="btn btn-sm btn-outline" onclick='showCaseDetail(${JSON.stringify(c).replace(/'/g, "&#39;")})'>查看</button></td>
      </tr>`;
    }).join('');
  }

  // 分页
  const pagDiv = document.getElementById('casePagination');
  let pagHtml = `<button ${data.page <= 1 ? 'disabled' : ''} onclick="loadCases(${data.page - 1})">← 上一页</button>`;
  pagHtml += `<span style="font-size:13px; color:var(--text-secondary);">第 ${data.page} / ${data.totalPages} 页 (共 ${data.total} 条)</span>`;
  pagHtml += `<button ${data.page >= data.totalPages ? 'disabled' : ''} onclick="loadCases(${data.page + 1})">下一页 →</button>`;
  pagDiv.innerHTML = pagHtml;
}

function showCaseDetail(c) {
  document.getElementById('caseDetailModal').style.display = 'flex';
  document.getElementById('caseDetailTitle').textContent = c.uid || '案例详情';

  const badgeCls = c.caseType === 'good' ? 'good' : 'bad';
  const badgeText = c.caseType === 'good' ? 'GoodCase (通过质检)' : 'BadCase (质检不通过)';

  document.getElementById('caseDetailContent').innerHTML = `
    <p><span class="case-badge ${badgeCls}">${badgeText}</span></p>
    <div style="margin:12px 0;"><strong>任务类型:</strong> ${c.taskType || '-'}</div>
    <div style="margin:12px 0;"><strong>领域分类:</strong> ${c.category || '-'}</div>
    <div style="margin:12px 0;"><strong>任务概括:</strong> ${c.taskSummary || '-'}</div>
    <div style="margin:12px 0;">
      <strong>题目内容:</strong>
      <div style="background:#f8fafc; padding:12px; border-radius:8px; margin-top:6px; max-height:300px; overflow-y:auto; font-size:13px; line-height:1.6; white-space:pre-wrap;">${c.title || '-'}</div>
    </div>
    ${c.issue ? `<div style="margin:12px 0;"><strong>质检意见:</strong><div style="background:#fff5f5; padding:12px; border-radius:8px; margin-top:6px; font-size:13px;">${c.issues}</div></div>` : ''}
    ${c.attachmentDesc ? `<div style="margin:12px 0;"><strong>附件描述:</strong> ${c.attachmentDesc}</div>` : ''}
    ${c.outputFormat ? `<div style="margin:12px 0;"><strong>产物格式:</strong> ${c.outputFormat}</div>` : ''}
  `;
}

// ========== 初始化 ==========
loadDashboard();
</script>
